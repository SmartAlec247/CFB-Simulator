<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBS Football Simulator Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent-blue: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success-gold: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        .dashboard {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #334155;
            padding-bottom: 20px;
        }

        header h1 {
            font-size: 2.5rem;
            margin: 0;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .series-counter {
            text-align: center;
            background: #0f172a;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 1rem;
            color: var(--success-gold);
            font-weight: bold;
            border: 1px solid #334155;
        }

        .matchup-selector {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            align-items: center;
            background: #111827;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .team-card {
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
        }

        .team-card label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-blue);
            font-weight: bold;
        }

        .search-input {
            width: 100%;
            padding: 12px;
            background: #1e293b;
            color: var(--text-main);
            border: 1px solid #475569;
            border-radius: 8px;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
        }
        .search-input:focus { border-color: var(--accent-blue); }

        .dropdown-select {
            width: 100%;
            padding: 10px;
            background: #334155;
            color: var(--text-main);
            border: 1px solid #475569;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
        }

        .center-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
        }

        .vs-circle {
            background: #334155;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--text-muted);
            border: 2px solid #475569;
        }

        .hfa-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
        }

        .sim-btn {
            width: 100%;
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: #020617;
            border-radius: 12px;
            margin: 25px 0;
            border: 1px solid #1e293b;
        }

        .score-panel { padding: 25px; text-align: center; }
        .score-panel.away { border-right: 1px solid #1e293b; }
        .score-team-name { font-size: 1.2rem; color: var(--text-muted); font-weight: 600; }
        .score-number { font-size: 4rem; font-weight: 800; font-family: monospace; }

        .game-feed {
            height: 450px;
            background: #090d16;
            border-radius: 8px;
            padding: 20px;
            overflow-y: auto;
            border: 1px solid #1e293b;
            font-family: 'Courier New', Courier, monospace;
        }

        details {
            background: #1e293b;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            overflow: hidden;
        }

        summary {
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            background: #111827;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        summary:hover { background: #1f2937; }

        .drive-content {
            padding: 10px 15px;
            background: #090d16;
            font-size: 0.9rem;
            border-top: 1px solid #334155;
        }

        .feed-line { margin-bottom: 4px; padding-bottom: 2px; border-bottom: 1px solid #111827; }
        .td-alert { color: #22c55e; font-weight: bold; }
        .fg-alert { color: #eab308; font-weight: bold; }
        .to-alert { color: #ef4444; font-weight: bold; }
        .q-header { background: #1e3a8a; color: white; padding: 6px 12px; font-weight: bold; margin: 15px 0 5px 0; border-radius: 4px; }
        .final-alert { color: #a855f7; font-weight: bold; font-size: 1.1rem; margin-top: 10px; }
    </style>
</head>
<body>

    </header>

    <div class="matchup-selector">
        <div class="team-card">
            <label>Away Team Search</label>
            <input type="text" id="awaySearch" class="search-input" placeholder="Type away team name..." oninput="filterTeams('away')">
            <select id="awayTeam" class="dropdown-select" onchange="syncSearchText('away')"></select>
        </div>
        <div class="center-controls">
            <div class="vs-circle">@</div>
            <label class="hfa-toggle">
                <input type="checkbox" id="hfaCheckbox" checked onchange="updateSeriesHistory()"> Home Advantage
            </label>
        </div>
        <div class="team-card">
            <label>Home Team Search</label>
            <input type="text" id="homeSearch" class="search-input" placeholder="Type home team name..." oninput="filterTeams('home')">
            <select id="homeTeam" class="dropdown-select" onchange="syncSearchText('home')"></select>
        </div>
    </div>

    <button class="sim-btn" onclick="executeGame()">Kick Off Simulation</button>

    <div class="scoreboard">
        <div class="score-panel away">
            <div class="score-team-name" id="awayNameDisplay">AWAY</div>
            <div class="score-number" id="awayScoreDisplay">0</div>
        </div>
        <div class="score-panel home">
            <div class="score-team-name" id="homeNameDisplay">HOME</div>
            <div class="score-number" id="homeScoreDisplay">0</div>
        </div>
    </div>

function populateDropdown(side, list) {
    const select = document.getElementById(`${side}Team`);
    select.innerHTML = "";
    list.forEach(team => {
        const masterIdx = rawTeamsList.findIndex(t => t.name === team.name);
        select.add(new Option(`${team.name} (O:${team.off} D:${team.def})`, masterIdx));
    });
}

function filterTeams(side) {
    const query = document.getElementById(`${side}Search`).value.toLowerCase();
    const filtered = rawTeamsList.filter(t => t.name.toLowerCase().includes(query));
    populateDropdown(side, filtered);
    if(filtered.length > 0) updateSeriesHistory();
}

function syncSearchText(side) {
    const select = document.getElementById(`${side}Team`);
    if(select.selectedIndex !== -1) {
        const teamName = rawTeamsList[select.value].name;
        document.getElementById(`${side}Search`).value = teamName;
    }
    updateSeriesHistory();
}

function setSelectByTeamName(side, name) {

    const idx = rawTeamsList.findIndex(t => t.name === name);
    select.value = idx;
    document.getElementById(`${side}Search`).value = name;

// Key format is always "TeamA_vs_TeamB" alphabetically arranged
function getSeriesKey() {
    const t1 = rawTeamsList[document.getElementById("awayTeam").value].name;
    const t2 = rawTeamsList[document.getElementById("homeTeam").value].name;
    return [t1, t2].sort().join("_vs_");
}

async function updateSeriesHistory() {
    const awayElement = document.getElementById("awayTeam");
    const homeElement = document.getElementById("homeTeam");
    if(!awayElement.value || !homeElement.value) return;

    const t1 = rawTeamsList[awayElement.value].name;
    const t2 = rawTeamsList[homeElement.value].name;
    const key = getSeriesKey();

    if (!supabaseClient) {
        document.getElementById("seriesDisplay").innerHTML = "Ready to Sim (Cloud Integration Pending Configuration Keys)";
        return;
    }

    let { data, error } = await supabaseClient
        .from('matchups')
        .select('*')
        .eq('id', key)
        .single();

    let games = 0, awayWins = 0, homeWins = 0;
    if (data) {
        games = data.games || 0;
        // Key design sorts names alphabetically, so find out which team maps to away vs home
        const alphabeticalTeams = [t1, t2].sort();
        if (t1 === alphabeticalTeams[0]) {
            awayWins = data.away_wins || 0;
            homeWins = data.home_wins || 0;
        } else {
            awayWins = data.home_wins || 0;
            homeWins = data.away_wins || 0;
        }
    }

    let pct1 = games > 0 ? ((awayWins / games) * 100).toFixed(1) : "0.0";
    let pct2 = games > 0 ? ((homeWins / games) * 100).toFixed(1) : "0.0";

    document.getElementById("seriesDisplay").innerHTML = 
        `Series History (Global Cloud): Played <b>${games}</b> Times <br> 
        ${t1}: ${awayWins} Wins (${pct1}%) | ${t2}: ${homeWins} Wins (${pct2}%)`;
}

async function executeGame() {
    const homeIdx = document.getElementById("homeTeam").value;
    const awayIdx = document.getElementById("awayTeam").value;

    if(homeIdx === awayIdx) { alert("Please choose two different teams."); return; }

    let home = { ...rawTeamsList[homeIdx], score: 0 };
    let away = { ...rawTeamsList[awayIdx], score: 0 };
    
    document.getElementById("awayNameDisplay").innerText = away.name;
    document.getElementById("homeNameDisplay").innerText = home.name;

    let feed = document.getElementById("gameFeed");
    feed.innerHTML = "";

    const useHFA = document.getElementById("hfaCheckbox").checked;
    const homePower = (home.off + home.def) / 2 + (useHFA ? 1.5 : 0); 
    const awayPower = (away.off + away.def) / 2;
    const gap = homePower - awayPower;
    const absGap = Math.abs(gap);

    let favoriteWinProbability = 0.5;

    if (absGap >= 22) {
        favoriteWinProbability = 0.935; 
    } else if (absGap <= 5) {
        favoriteWinProbability = 0.5 + (absGap * 0.018);
    } else {
        favoriteWinProbability = 0.59 + ((absGap - 5) * 0.02);
    }

    const homeShouldWin = gap >= 0 ? (Math.random() < favoriteWinProbability) : (Math.random() > favoriteWinProbability);
    const isUpsetScenario = (absGap >= 22 && ((gap > 0 && !homeShouldWin) || (gap < 0 && homeShouldWin)));
    const isCompetitiveMatchup = (absGap < 10);

    let quarter = 1;
    let clockSeconds = 900;
    let offense = Math.random() > 0.5 ? home : away;
    
    let yardLine = 25, down = 1, distance = 10;
    let currentDrivePlays = [];

    while (quarter <= 4) {
        feed.innerHTML += `<div class="q-header">QUARTER ${quarter}</div>`;
        
        while (clockSeconds > 0) {
            let defense = (offense === home) ? away : home;
            clockSeconds -= (Math.floor(Math.random() * 5) + 28);
            if (clockSeconds < 0) clockSeconds = 0;

            let min = Math.floor(clockSeconds / 60), sec = (clockSeconds % 60).toString().padStart(2, '0');
            let playLoc = yardLine > 50 ? `OPP ${100 - yardLine}` : `OWN ${yardLine}`;
            let logPrefix = `[${min}:${sec}] ${down}&${distance} at ${playLoc}: `;

            let playLuck = Math.random() * 100;
            let isPass = Math.random() > 0.48;
            let playType = isPass ? "Pass" : "Run";

            let narrativeEdge = 0;
            if (isUpsetScenario) {
                narrativeEdge = (offense === home && homeShouldWin) || (offense === away && !homeShouldWin) ? 1.0 : -1.0;
            } else if (isCompetitiveMatchup) {
                narrativeEdge = (offense === home) ? (gap * 0.2) : (-gap * 0.2);
            } else {
                narrativeEdge = homeShouldWin ? ((offense === home) ? 4.5 : -4.5) : ((offense === away) ? 4.5 : -4.5);
            }

            let turnoverChance = 3.5;
            if (!isUpsetScenario && !isCompetitiveMatchup) {
                turnoverChance = (offense === home && homeShouldWin) || (offense === away && !homeShouldWin) ? 1.5 : 7.0;
            }
            
            if (playLuck < turnoverChance) { 
                currentDrivePlays.push(`${logPrefix} ${playType} -> <span class="to-alert">TURNOVER LOST!</span>`);
                flushDrive(feed, offense.name, "TURNOVER", currentDrivePlays);
                currentDrivePlays = []; offense = defense; yardLine = 100 - yardLine; down = 1; distance = 10; continue;
            }

            let baseGain = 3.8 + (narrativeEdge * 0.3);
            let playVariance = (Math.random() * 12 - 6);
            let yardsGained = Math.floor(baseGain + playVariance);
            
            if (playLuck > 96.5) yardsGained += Math.floor(Math.random() * 10) + 6; 
            if (yardsGained < -2) yardsGained = -2;

            yardLine += yardsGained;

            if (yardLine >= 100) {
                offense.score += 7;
                currentDrivePlays.push(`${logPrefix} ${playType} for ${yardsGained} yds -> <span class="td-alert">TOUCHDOWN!</span>`);
                flushDrive(feed, offense.name, "TOUCHDOWN", currentDrivePlays);
                currentDrivePlays = []; updateScoreboard(away.score, home.score);
                offense = defense; yardLine = 25; down = 1; distance = 10; continue;
            }

            currentDrivePlays.push(`${logPrefix} ${playType} gains ${yardsGained} yards.`);

            if (yardsGained >= distance) {
                down = 1; distance = Math.min(10, 100 - yardLine);
            } else {
                distance -= yardsGained; down++;
                if (down > 4) {
                    if (yardLine >= 65) { 
                        let fgDist = (100 - yardLine) + 17;
                        let fgSuccess = (Math.random() * 100 + narrativeEdge) > (fgDist - 15);
                        if (fgSuccess) {
                            offense.score += 3;
                            currentDrivePlays.push(`4th Down: Attempting ${fgDist}-yard Field Goal -> <span class="fg-alert">GOOD!</span>`);
                            flushDrive(feed, offense.name, `FIELD GOAL (${fgDist} Yds)`, currentDrivePlays);
                        } else {
                            currentDrivePlays.push(`4th Down: Attempting ${fgDist}-yard Field Goal -> <span class="to-alert">MISSED!</span>`);
                            flushDrive(feed, offense.name, "MISSED FG", currentDrivePlays);
                        }
                        updateScoreboard(away.score, home.score);
                    } else {
                        let puntDist = Math.floor(Math.random() * 8) + 39;
                        currentDrivePlays.push(`4th Down: Punts ball downfield -> ${puntDist} yards.`);
                        flushDrive(feed, offense.name, `PUNT (${puntDist} Yds)`, currentDrivePlays);
                    }
                    currentDrivePlays = []; offense = defense; yardLine = Math.max(20, 100 - yardLine); down = 1; distance = 10;
                }
            }
        }
        quarter++; clockSeconds = 900;
    }

    if (home.score === away.score) {
        if (homeShouldWin) { home.score += 3; feed.innerHTML += `<div class="feed-line">[OVERTIME] Field Goal kicks through!</div>`; } 
        else { away.score += 3; feed.innerHTML += `<div class="feed-line">[OVERTIME] Field Goal kicks through!</div>`; }
    }

    if (supabaseClient) {
        const key = getSeriesKey();
        const alphabeticalTeams = [away.name, home.name].sort();
        
        let isAwayFirstAlphabetically = (away.name === alphabeticalTeams[0]);
        let gameWinnerWasAway = (away.score > home.score);

        let { data } = await supabaseClient.from('matchups').select('*').eq('id', key).single();
        
        let currentGames = data ? (data.games || 0) : 0;
        let currentAwayWins = data ? (data.away_wins || 0) : 0;
        let currentHomeWins = data ? (data.home_wins || 0) : 0;

        let newAwayWins = currentAwayWins;
        let newHomeWins = currentHomeWins;

        if (gameWinnerWasAway) {
            if (isAwayFirstAlphabetically) { newAwayWins++; } else { newHomeWins++; }
        } else {
            if (isAwayFirstAlphabetically) { newHomeWins++; } else { newAwayWins++; }
        }

        await supabaseClient.from('matchups').upsert({
            id: key,
            games: currentGames + 1,
            away_wins: newAwayWins,
            home_wins: newHomeWins
        });
        
        updateSeriesHistory();
    }

    updateScoreboard(away.score, home.score);
    feed.innerHTML += `<div class="final-alert">🏁 FINAL: ${away.name} ${away.score} - ${home.name} ${home.score}</div>`;
    feed.scrollTop = feed.scrollHeight;
}

function flushDrive(feed, teamName, status, playsArray) {
    if (playsArray.length === 0) return;
    let html = `<details>
        <summary>
            <span>🏈 ${teamName} Drive Summary</span>
            <span style="color: var(--accent-blue)">[${status}]</span>
        </summary>
        <div class="drive-content">`;
            playsArray.forEach(p => { html += `<div class="feed-line">${p}</div>`; });
    html += `</div></details>`;
    feed.innerHTML += html;
}

function updateScoreboard(awayScore, homeScore) {
    document.getElementById("awayScoreDisplay").innerText = awayScore;
    document.getElementById("homeScoreDisplay").innerText = homeScore;
}
</script>

</html>
